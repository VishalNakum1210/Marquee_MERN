<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styCss.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Document</title>
  </head>
  <body>
    <section class="MainCard">
      <section class="Left-section">
        <section class="Left-section-heading">
          <h3>Technologies</h3>
        </section>
        <section class="Left-section-all-card">
          <span class="Left-section-card">
            <div><i class="fa-solid fa-display"></i></div>
            <div><p>Frontend</p></div>
          </span>
          <span class="Left-section-card">
            <div><i class="fa-solid fa-server"></i></div>
            <div><p>Backend</p></div>
          </span>
          <span class="Left-section-card">
            <div><i class="fa-solid fa-mobile-screen"></i></div>
            <div><p>Mobile</p></div>
          </span>
          <span class="Left-section-card">
            <div><i class="fa-brands fa-buffer"></i></div>
            <div><p>Platforms</p></div>
          </span>
          <span class="Left-section-card">
            <div><i class="fa-solid fa-database"></i></div>
            <div><p>Database</p></div>
          </span>
        </section>
      </section>
      <section class="Right-section">
        <section class="Right-section-header">
          <i class="fa-solid fa-display"></i>
          <section>
            <h1>Frontend</h1>
            <div class="divider"></div>
          </section>
        </section>
        <section class="Right-section-all-card">
          <div class="Right-section-sub-card">
            <i style="color: red" class="fa-brands fa-angular"></i>
            <p>Angular</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #70d9f3" class="fa-brands fa-react"></i>
            <p>React JS</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #67c195" class="fa-brands fa-vuejs"></i>
            <p>Vue.js</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #f5dd1a" class="fa-brands fa-js"></i>
            <p>JavaScript</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #2a72ae" class="fa-brands fa-css3-alt"></i>
            <p>CSS3</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #d9592d" class="fa-brands fa-html5"></i>
            <p>HTML5</p>
          </div>
          <div class="Right-section-sub-card">
            <i style="color: #000" class="fa-brands fa-react"></i>
            <p>Next.js</p>
          </div>
        </section>
      </section>
    </section>
  </body>
</html>
